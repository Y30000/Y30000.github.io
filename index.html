<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BPM Analyzer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <h1 id="app-title">BPM Analyzer</h1>
            <p id="statusText">오디오 파일을 선택하세요.</p>
          </div>
          <button id="resetButton" class="icon-button" type="button" title="초기화" aria-label="초기화">
            <span aria-hidden="true">↺</span>
          </button>
        </header>

        <label id="dropZone" class="drop-zone" for="audioInput">
          <input id="audioInput" type="file" accept="audio/*">
          <span class="upload-icon" aria-hidden="true">♪</span>
          <span id="fileName">파일 선택</span>
        </label>

        <div class="actions">
          <button id="analyzeButton" type="button" disabled>분석</button>
        </div>

        <section class="results" aria-label="분석 결과">
          <div class="metric primary">
            <span>BPM</span>
            <strong id="bpmValue">--</strong>
          </div>
          <div class="metric">
            <span>신뢰도</span>
            <strong id="confidenceValue">--</strong>
          </div>
          <div class="metric wide">
            <span>후보</span>
            <strong id="candidateValue">--</strong>
          </div>
          <div class="metric wide">
            <span>길이</span>
            <strong id="durationValue">--</strong>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
